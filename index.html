<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TicketBaazi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar">
      <div class="nav-inner">
        <button id="nav-logo" class="logo">🎬 TicketBaazi</button>
        <div id="user-bar">
          <div id="user-logged-in" class="user-info hidden">
            <span>Hi, <strong id="user-email"></strong></span>
            <button id="my-bookings-btn" class="btn-ghost">🎟 My Bookings</button>
            <button id="logout-btn" class="btn-ghost">Logout</button>
          </div>
          <button id="open-login-btn" class="btn-primary hidden">Sign In</button>
        </div>
      </div>
    </nav>

    <!-- Auth Modal -->
    <div id="auth-modal" class="modal-overlay hidden">
      <div class="modal-box">
        <button id="modal-close" class="modal-close">✕</button>
        <div class="modal-tabs">
          <button id="tab-login" class="tab active">Login</button>
          <button id="tab-register" class="tab">Register</button>
        </div>
        <p id="auth-error" class="auth-error hidden"></p>
        <input id="auth-email" type="email" placeholder="Email" class="input" />
        <input id="auth-password" type="password" placeholder="Password" class="input" />
        <button id="auth-submit" class="btn-primary full">Login</button>
        <div class="divider"><span>or</span></div>
        <button id="guest-btn" class="btn-ghost full">👤 Continue as Guest</button>
        <p class="hint">Guest: <code>guest@ticketbaazi.com</code> / <code>Guest@1234</code></p>
      </div>
    </div>

    <!-- Name Dialog -->
    <div id="name-dialog" class="modal-overlay hidden">
      <div class="modal-box" style="max-width:420px">
        <button id="name-dialog-close" class="modal-close">✕</button>
        <div style="margin-bottom:20px">
          <div class="modal-title">Who's coming? 🎬</div>
          <div class="modal-sub" id="name-dialog-sub"></div>
        </div>
        <div id="name-fields"></div>
        <button id="name-dialog-confirm" class="btn-primary full" style="margin-top:8px">Confirm Booking</button>
      </div>
    </div>

    <!-- Pages -->
    <div id="page-movies"></div>
    <div id="page-seats" class="hidden"></div>
    <div id="page-bookings" class="hidden"></div>

    <!-- Booking Ticket Overlay -->
    <div id="ticket-overlay" class="ticket-overlay hidden">
      <div class="ticket">
        <div class="ticket-header">
          <span class="ticket-icon">🎟️</span>
          <h3 id="ticket-movie"></h3>
          <button id="ticket-close" class="ticket-close">✕</button>
        </div>
        <div class="ticket-body">
          <div class="ticket-row"><span>Show</span><strong id="ticket-time"></strong></div>
          <div class="ticket-row"><span>Seats</span><strong id="ticket-seats"></strong></div>
          <div class="ticket-row"><span>Name</span><strong id="ticket-name"></strong></div>
          <div class="ticket-row"><span>Amount</span><strong id="ticket-amount"></strong></div>
        </div>
        <div class="ticket-footer">
          <div class="ticket-barcode">||||| |||| ||| ||||| ||||</div>
          <p class="ticket-enjoy">Enjoy the show! 🍿</p>
        </div>
      </div>
    </div>

    <script src="./src/script.js"></script>
  </body>
</html>
