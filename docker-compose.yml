services:
  postgres:
    image: postgres:16
    container_name: cohortDB
    restart: always
    environment:
      POSTGRES_USER: jaani
      POSTGRES_PASSWORD: youarethepassword
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: